<body>

    <main>
        <h3>Lighting</h3>
    </main>
    <script>
    // Récupère le nom de la page actuelle (ex: "shaders.html")
    const currentPage = window.location.pathname.split("/").pop();

    // Sélectionne tous les liens dans la nav
    const navLinks = document.querySelectorAll('nav a');

    navLinks.forEach(link => {
        // Si le href du lien correspond à la page actuelle, ajoute la classe "active"
        if (link.getAttribute('href') === currentPage) {
            link.classList.add('active');
        }
    });
</script>
</body>
